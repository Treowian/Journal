<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notre Histoire</title>
    
    <style>
        /* ==========================================================================
           🎨 SYSTEME DE DESIGN & VARIABLES (THEME VIOLET AMETHYSTE)
           ========================================================================== */
        :root {
            --bg-color: #faf8fc;
            --text-color: #31213e;
            --text-light: #847395;
            --accent-color: #8e44ad;
            --line-color: #dfd5e8;
            --card-bg: #ffffff;
            --error-color: #c0392b;
        }

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg-color); color: var(--text-color); 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* CONNEXION */
        .login-container { width: 100%; max-width: 400px; padding: 2rem; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; flex-grow: 1; }
        .login-title { text-align: center; margin-bottom: 0.5rem; color: var(--text-color); font-size: 2rem; }
        .login-subtitle { text-align: center; color: var(--text-light); margin-top: 0; margin-bottom: 2rem; font-size: 0.9rem;}
        .login-form { display: flex; flex-direction: column; gap: 1rem; }
        .login-form input { padding: 1rem; border: 1px solid var(--line-color); border-radius: 8px; font-size: 1rem; outline: none; transition: border-color 0.2s; }
        .login-form input:focus { border-color: var(--accent-color); }
        .btn-primary { background: var(--text-color); color: #fff; border: none; padding: 1rem; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: opacity 0.2s; margin-top: 1rem; }
        .btn-primary:hover:not(:disabled) { opacity: 0.9; }
        .error-msg { color: var(--error-color); font-size: 0.9rem; text-align: center; margin-top: 0.5rem; }

        /* HEADER */
        #app-screen { width: 100%; max-width: 900px; padding: 1rem; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--line-color);}
        .btn-small { background: transparent; border: 1px solid var(--text-light); color: var(--text-color); padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: background 0.2s;}
        .btn-small:hover { background: rgba(0,0,0,0.05); }

        /* FRISE CHRONOLOGIQUE */
        .timeline { position: relative; width: 100%; margin: 0 auto; padding: 2rem 0; box-sizing: border-box;}
        .timeline::after { content: ''; position: absolute; width: 2px; background-color: var(--line-color); top: 0; bottom: 0; left: 50%; transform: translateX(-50%); }
        .timeline-item { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 3rem; z-index: 2; box-sizing: border-box;}
        .timeline-dot { width: 16px; height: 16px; background-color: var(--accent-color); border: 4px solid var(--bg-color); border-radius: 50%; margin-bottom: 1rem; z-index: 3; box-sizing: content-box; }
        .timeline-card { width: 90%; padding: 1.5rem; background-color: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 20px rgba(142, 68, 173, 0.08); box-sizing: border-box; }

        /* EN-TÊTE DE LA CARTE AVEC BOUTONS */
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
        .card-meta { font-size: 0.85rem; color: var(--accent-color); font-weight: bold; text-transform: uppercase; letter-spacing: 1px;}
        .card-actions { display: flex; gap: 0.5rem; }
        .btn-action { background: none; border: none; font-size: 1rem; cursor: pointer; opacity: 0.5; transition: opacity 0.2s; padding: 0; }
        .btn-action:hover { opacity: 1; }

        .card-title { margin: 0 0 1rem 0; font-size: 1.3rem; }
        .card-text { margin: 0 0 1.5rem 0; line-height: 1.6; color: #4a5568; white-space: pre-wrap; }

        /* GALERIE */
        .card-gallery { position: relative; width: 100%; height: 250px; border-radius: 8px; overflow: hidden; background-color: #dfd5e8; cursor: pointer; transition: transform 0.2s ease; }
        .card-gallery:hover { transform: scale(0.99); }
        .card-gallery img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .card-gallery.has-more::after { content: attr(data-more); position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(49, 33, 62, 0.6); color: white; font-size: 3rem; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        /* PC RESPONSIVE */
        @media screen and (min-width: 768px) {
            .timeline-item { width: 50%; display: flex; flex-direction: column; margin-bottom: 0; box-sizing: border-box;}
            .timeline-card { width: 100%; text-align: left; }
            .timeline-item:nth-child(odd) { left: 0; padding: 2rem 3rem 2rem 0; align-items: flex-end; }
            .timeline-item:nth-child(even) { left: 50%; padding: 2rem 0 2rem 3rem; align-items: flex-start; }
            .timeline-dot { display: none; }
            .timeline-item::after { content: ''; position: absolute; width: 16px; height: 16px; background-color: var(--accent-color); border: 4px solid var(--bg-color); border-radius: 50%; top: 50%; z-index: 3; box-sizing: content-box; }
            .timeline-item:nth-child(odd)::after { left: 100%; transform: translate(-50%, -50%); }
            .timeline-item:nth-child(even)::after { left: 0; transform: translate(-50%, -50%); }
        }

        /* FAB */
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background-color: var(--accent-color); color: white; border: none; font-size: 2.3rem; font-weight: 300; box-shadow: 0 4px 15px rgba(142, 68, 173, 0.4); cursor: pointer; z-index: 50; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
        .fab:hover { transform: scale(1.1); }

        /* MODALES */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(49, 33, 62, 0.8); z-index: 100; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
        .modal-box { background: var(--card-bg); width: 95%; max-width: 500px; padding: 2rem; border-radius: 12px; max-height: 90vh; overflow-y: auto; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-title { margin-top: 0; color: var(--accent-color); }
        .form-group { margin-bottom: 1.2rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.85rem; color: var(--text-light); font-weight: bold; text-transform: uppercase;}
        .form-group input, .form-group textarea { padding: 0.8rem; border: 1px solid var(--line-color); border-radius: 8px; font-family: inherit; font-size: 1rem; outline: none; background: #fff; color: var(--text-color); }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--accent-color); }
        .form-group textarea { resize: vertical; min-height: 120px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 1.5rem; margin-top: 2rem; }
        .btn-cancel { background: transparent; border: none; color: var(--text-light); font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-submit { background: var(--accent-color); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }

        /* LIGHTBOX */
        .lightbox-content { position: relative; width: 95%; max-width: 800px; display: flex; align-items: center; justify-content: center; }
        .lightbox-img { max-width: 100%; max-height: 80vh; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); object-fit: contain; }
        .lightbox-nav { background: rgba(255,255,255,0.2); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; position: absolute; top: 50%; transform: translateY(-50%); transition: background 0.2s; z-index: 110; }
        .lightbox-nav:hover { background: rgba(255,255,255,0.4); }
        .nav-prev { left: -60px; }
        .nav-next { right: -60px; }
        .close-lightbox { position: absolute; top: -40px; right: 0; color: white; font-size: 2.5rem; cursor: pointer; line-height: 1; }

        @media screen and (max-width: 920px) { .nav-prev { left: 10px; } .nav-next { right: 10px; } .close-lightbox { right: 10px; } }
    </style>
</head>
<body>

    <div id="login-screen" class="login-container">
        <h1 class="login-title">Notre Histoire</h1>
        <p class="login-subtitle">Connexion à votre espace privé</p>
        <form id="login-form" class="login-form">
            <input type="email" id="email" placeholder="Adresse e-mail" required autocomplete="email">
            <input type="password" id="password" placeholder="Mot de passe" required autocomplete="current-password">
            <button type="submit" id="btn-login" class="btn-primary">Entrer</button>
            <p id="login-error" class="error-msg hidden">Identifiants incorrects.</p>
        </form>
    </div>

    <div id="app-screen" class="hidden">
        <div class="header">
            <h2 style="margin:0; color: var(--accent-color);">Notre Journal</h2>
            <button id="btn-logout" class="btn-small">Se déconnecter</button>
        </div>
        <div class="timeline" id="timeline-container"></div>
        <button class="fab" onclick="openAddModal()">+</button>
    </div>

    <div id="modal-add" class="modal-overlay hidden">
        <div class="modal-box">
            <h2 class="modal-title">Nouveau souvenir</h2>
            <form id="form-add">
                <div class="form-group"><label>Date</label><input type="date" id="input-date" required></div>
                <div class="form-group"><label>Lieu</label><input type="text" id="input-location" placeholder="Ex: Marseille, France"></div>
                <div class="form-group"><label>Titre</label><input type="text" id="input-title" required></div>
                <div class="form-group"><label>Histoire</label><textarea id="input-story"></textarea></div>
                <div class="form-group"><label>Photos</label><input type="file" id="input-photos" accept="image/*" multiple></div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeAddModal()">Annuler</button>
                    <button type="submit" class="btn-submit">Sauvegarder</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-edit" class="modal-overlay hidden">
        <div class="modal-box">
            <h2 class="modal-title">Modifier le souvenir</h2>
            <form id="form-edit">
                <input type="hidden" id="edit-id">
                <div class="form-group"><label>Date</label><input type="date" id="edit-date" required></div>
                <div class="form-group"><label>Lieu</label><input type="text" id="edit-location"></div>
                <div class="form-group"><label>Titre</label><input type="text" id="edit-title" required></div>
                <div class="form-group"><label>Histoire</label><textarea id="edit-story"></textarea></div>
                
                <div class="form-group">
                    <label>Photos actuelles (clique sur × pour en enlever)</label>
                    <div id="edit-photos-preview" style="display:flex; gap:10px; flex-wrap:wrap; margin-top:5px;"></div>
                </div>
                
                <div class="form-group">
                    <label>Ajouter de nouvelles photos</label>
                    <input type="file" id="edit-photos" accept="image/*" multiple>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeEditModal()">Annuler</button>
                    <button type="submit" class="btn-submit">Mettre à jour</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-lightbox" class="modal-overlay hidden">
        <div class="lightbox-content">
            <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
            <button class="lightbox-nav nav-prev" onclick="prevPhoto()">&lt;</button>
            <img src="" id="lightbox-img" class="lightbox-img" alt="Vue HD">
            <button class="lightbox-nav nav-next" onclick="nextPhoto()">&gt;</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        
        // ⚠️ TA CONFIGURATION FIREBASE EXACTEMENT ICI
        const firebaseConfig = {
  apiKey: "AIzaSyDOH4_A1Ifa9eZ3EkSeCQu46BwbuSoNA2g",
  authDomain: "notre-journal-93ae5.firebaseapp.com",
  projectId: "notre-journal-93ae5",
  storageBucket: "notre-journal-93ae5.firebasestorage.app",
  messagingSenderId: "949489326058",
  appId: "1:949489326058:web:3b77c41d414ff011e14493"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Mémoire globale des données
        window.memoriesData = {};
        window.currentEditImages = []; // Tableau tampon pour gérer les photos en cours d'édition

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        }

        function formatDate(dateString) {
            if(!dateString) return '';
            return new Date(dateString).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();
        }

        // AUTHENTIFICATION
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                loadMemories();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.disabled = true; btn.textContent = "Vérification...";
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            } catch (error) {
                document.getElementById('login-error').classList.remove('hidden');
                btn.disabled = false; btn.textContent = "Entrer";
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // AJOUTER UN SOUVENIR
        document.getElementById('form-add').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.querySelector('#form-add .btn-submit');
            btn.disabled = true; btn.textContent = "Envoi en cours... ⏳";

            // ⚠️ TES IDENTIFIANTS CLOUDINARY ICI
            const cloudinaryCloudName = "dac4juzg7"; 
            const cloudinaryPreset = "jy8vjemd";

            try {
                const date = document.getElementById('input-date').value;
                const location = document.getElementById('input-location').value;
                const title = document.getElementById('input-title').value;
                const story = document.getElementById('input-story').value;
                const files = document.getElementById('input-photos').files;

                const imageUrls = [];
                for (const file of files) {
                    const formData = new FormData();
                    formData.append("file", file);
                    formData.append("upload_preset", cloudinaryPreset);

                    const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudinaryCloudName}/image/upload`, {
                        method: "POST", body: formData
                    });
                    if(!res.ok) throw new Error("Erreur Cloudinary");
                    const data = await res.json();
                    imageUrls.push(data.secure_url);
                }

                await addDoc(collection(db, "memories"), {
                    date: date, location: location, title: title, story: story, images: imageUrls, timestamp: serverTimestamp()
                });

                document.getElementById('form-add').reset();
                closeAddModal();
                loadMemories();
            } catch (error) {
                console.error(error);
                alert("Erreur réseau lors de la mise en ligne des photos.");
            } finally {
                btn.disabled = false; btn.textContent = "Sauvegarder";
            }
        });

        // ENREGISTRER LES MODIFICATIONS (TEXTE + NOUVELLES PHOTOS ET SUPPRESSIONS)
        document.getElementById('form-edit').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.querySelector('#form-edit .btn-submit');
            btn.disabled = true; btn.textContent = "Mise à jour... ⏳";

            // ⚠️ TES IDENTIFIANTS CLOUDINARY ICI
            const cloudinaryCloudName = "dac4juzg7"; 
            const cloudinaryPreset = "jy8vjemd";

            try {
                const id = document.getElementById('edit-id').value;
                
                // On récupère la liste des images tampons validées (qui ont survécu aux suppressions de la modale)
                let finalImages = [...window.currentEditImages];
                
                // On vérifie s'il y a de NOUVELLES images à uploader
                const newFiles = document.getElementById('edit-photos').files;
                for (const file of newFiles) {
                    const formData = new FormData();
                    formData.append("file", file);
                    formData.append("upload_preset", cloudinaryPreset);

                    const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudinaryCloudName}/image/upload`, {
                        method: "POST", body: formData
                    });
                    if(!res.ok) throw new Error("Erreur Cloudinary lors de la modification");
                    const data = await res.json();
                    finalImages.push(data.secure_url); // On fusionne la nouvelle URL dans le tableau final
                }

                // On écrase l'enregistrement Firestore avec le texte mis à jour ET la nouvelle liste d'images
                await updateDoc(doc(db, "memories", id), {
                    date: document.getElementById('edit-date').value,
                    location: document.getElementById('edit-location').value,
                    title: document.getElementById('edit-title').value,
                    story: document.getElementById('edit-story').value,
                    images: finalImages
                });

                document.getElementById('form-edit').reset();
                closeEditModal();
                loadMemories();
            } catch (error) {
                console.error(error);
                alert("Erreur lors de la modification du souvenir.");
            } finally {
                btn.disabled = false; btn.textContent = "Mettre à jour";
            }
        });

        // CHARGER LES SOUVENIRS
        async function loadMemories() {
            const container = document.getElementById('timeline-container');
            container.innerHTML = '<p style="text-align:center; width:100%; color:var(--text-light);">Chargement de vos mémoires...</p>';

            try {
                const q = query(collection(db, "memories"), orderBy("date", "desc"));
                const snapshot = await getDocs(q);
                container.innerHTML = ''; 
                window.memoriesData = {};

                if (snapshot.empty) {
                    container.innerHTML = '<p style="text-align:center; width:100%; color:var(--text-light); font-style:italic;">Votre journal est vierge. Cliquez sur +</p>';
                    return;
                }

                snapshot.forEach(firestoreDoc => {
                    const id = firestoreDoc.id;
                    const data = firestoreDoc.data();
                    window.memoriesData[id] = data; 

                    const safeLocation = escapeHTML(data.location);
                    const safeTitle = escapeHTML(data.title);
                    const safeStory = escapeHTML(data.story);
                    const displayDate = formatDate(data.date);

                    let galleryHTML = '';
                    if (data.images && data.images.length > 0) {
                        const firstImage = data.images[0];
                        const imagesArrayString = JSON.stringify(data.images).replace(/"/g, '&quot;');
                        
                        if (data.images.length === 1) {
                            galleryHTML = `<div class="card-gallery" onclick="openLightbox(${imagesArrayString}, 0)"><img src="${firstImage}" loading="lazy"></div>`;
                        } else {
                            const extraCount = data.images.length - 1;
                            galleryHTML = `<div class="card-gallery has-more" data-more="+${extraCount}" onclick="openLightbox(${imagesArrayString}, 0)"><img src="${firstImage}" loading="lazy"></div>`;
                        }
                    }

                    const cardHTML = `
                        <div class="timeline-item" id="item-${id}">
                            <div class="timeline-dot"></div>
                            <div class="timeline-card">
                                <div class="card-header">
                                    <div class="card-meta">${safeLocation ? `📍 ${safeLocation} — ` : ''}${displayDate}</div>
                                    <div class="card-actions">
                                        <button class="btn-action" onclick="openEditModal('${id}')" title="Modifier">✏️</button>
                                        <button class="btn-action" onclick="deleteMemory('${id}')" title="Supprimer">🗑️</button>
                                    </div>
                                </div>
                                <h3 class="card-title">${safeTitle}</h3>
                                <p class="card-text">${safeStory}</p>
                                ${galleryHTML}
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHTML);
                });
            } catch(err) {
                console.error(err);
                container.innerHTML = '<p style="text-align:center; width:100%; color:var(--error-color);">Erreur lors de la lecture.</p>';
            }
        }

        // SUPPRIMER UN SOUVENIR
        window.deleteMemory = async (id) => {
            if(!confirm("Supprimer définitivement ce souvenir ?")) return;
            try {
                await deleteDoc(doc(db, "memories", id));
                document.getElementById(`item-${id}`).remove();
            } catch (error) {
                console.error(error);
                alert("Erreur lors de la suppression.");
            }
        };

        // FONCTIONS GLOBALES (MODALES)
        window.openAddModal = () => { document.getElementById('input-date').value = new Date().toISOString().split('T')[0]; document.getElementById('modal-add').classList.remove('hidden'); };
        window.closeAddModal = () => document.getElementById('modal-add').classList.add('hidden');
        
        // INTERFACE : OUVERTURE DE LA MODALE MODIFICATION AVEC LES SOUVENIRS DEJA PRESENTS
        window.openEditModal = (id) => {
            const data = window.memoriesData[id];
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-date').value = data.date;
            document.getElementById('edit-location').value = data.location || "";
            document.getElementById('edit-title').value = data.title;
            document.getElementById('edit-story').value = data.story || "";
            
            // On fait une copie locale des images associées à ce souvenir pour l'éditer en temps réel
            window.currentEditImages = [...(data.images || [])];
            window.renderEditPhotosPreview(); // Lancement du rendu des miniatures
            
            document.getElementById('modal-edit').classList.remove('hidden');
        };
        
        window.closeEditModal = () => document.getElementById('modal-edit').classList.add('hidden');

        // RE-DESSINER L'ALBUM PHOTO TEMPORAIRE À L'INTÉRIEUR DE LA FENÊTRE DE MODIFICATION
        window.renderEditPhotosPreview = () => {
            const previewContainer = document.getElementById('edit-photos-preview');
            previewContainer.innerHTML = ''; // On remet à zéro la zone
            
            if (window.currentEditImages.length === 0) {
                previewContainer.innerHTML = '<p style="font-size:0.9rem; color:var(--text-light); margin:0; font-style:italic;">Aucune photo associée à ce souvenir.</p>';
                return;
            }

            window.currentEditImages.forEach((imgUrl, index) => {
                const div = document.createElement('div');
                div.style.cssText = "position:relative; width:80px; height:80px; border-radius:6px; overflow:hidden; border:1px solid var(--line-color);";
                div.innerHTML = `
                    <img src="${imgUrl}" style="width:100%; height:100%; object-fit:cover;">
                    <button type="button" onclick="removeImageFromEdit(${index})" style="position:absolute; top:2px; right:2px; background:rgba(49,33,62,0.8); color:white; border:none; border-radius:50%; width:20px; height:20px; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; line-height:1; font-weight:bold;">&times;</button>
                `;
                previewContainer.appendChild(div);
            });
        };

        // ENLEVER TEMPORAIREMENT UNE PHOTO DU SOUVENIR (AVANT VALIDATION)
        window.removeImageFromEdit = (index) => {
            window.currentEditImages.splice(index, 1); // Retire l'image choisie du tableau temporaire
            window.renderEditPhotosPreview(); // Rafraîchit les miniatures
        };

        // LIGHTBOX
        let currentPhotos = [];
        let currentIndex = 0;
        window.openLightbox = (photosArray, index) => { currentPhotos = photosArray; currentIndex = index; document.getElementById('lightbox-img').src = currentPhotos[currentIndex]; document.getElementById('modal-lightbox').classList.remove('hidden'); };
        window.closeLightbox = () => document.getElementById('modal-lightbox').classList.add('hidden');
        window.prevPhoto = () => { if(currentPhotos.length <= 1) return; currentIndex = (currentIndex === 0) ? currentPhotos.length - 1 : currentIndex - 1; document.getElementById('lightbox-img').src = currentPhotos[currentIndex]; };
        window.nextPhoto = () => { if(currentPhotos.length <= 1) return; currentIndex = (currentIndex === currentPhotos.length - 1) ? 0 : currentIndex + 1; document.getElementById('lightbox-img').src = currentPhotos[currentIndex]; };
    </script>
</body>
</html>
